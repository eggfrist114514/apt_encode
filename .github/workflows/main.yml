name: Build All Platforms

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  # ==================== Windows 平台 ====================
  windows-amd64:
    name: Windows - AMD64
    runs-on: windows-latest
    strategy:
      matrix:
        type: [cli, gui]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'
      - name: Install dependencies
        run: pip install pyinstaller numpy pillow
      - name: Build CLI
        if: matrix.type == 'cli'
        run: pyinstaller --onefile --icon="build/windows/app.ico" --name="apt-cli-win-amd64" "build/windows/apt2.0.1.py"
      - name: Build GUI
        if: matrix.type == 'gui'
        run: pyinstaller --onefile --noconsole --icon="build/windows/app.ico" --name="apt-gui-win-amd64" "build/windows/apt2.0.1-ui.py"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: apt-win-amd64-${{ matrix.type }}
          path: dist/*.exe

  windows-x86:
    name: Windows - x86 (32-bit)
    runs-on: windows-latest
    strategy:
      matrix:
        type: [cli, gui]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 32-bit
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x86'
      - name: Install dependencies
        run: pip install pyinstaller numpy pillow
      - name: Build CLI
        if: matrix.type == 'cli'
        run: pyinstaller --onefile --icon="build/windows/app.ico" --name="apt-cli-win-x86" "build/windows/apt2.0.1.py"
      - name: Build GUI
        if: matrix.type == 'gui'
        run: pyinstaller --onefile --noconsole --icon="build/windows/app.ico" --name="apt-gui-win-x86" "build/windows/apt2.0.1-ui.py"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: apt-win-x86-${{ matrix.type }}
          path: dist/*.exe

  # ==================== Linux 平台（使用 QEMU 用户模式模拟）====================
  
  # 基础步骤：用于跨架构编译
  # 原理：在 ubuntu-latest (x86_64) 上安装 QEMU 静态模拟器，然后使用目标架构的 rootfs 或系统库来编译
  
  linux-cross:
    name: Linux - ${{ matrix.arch }} (${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 架构
          - distro: ubuntu
            arch: amd64
            qemu_arch: x86_64
            deb_arch: amd64
            python_arch: x64
          - distro: ubuntu
            arch: arm64
            qemu_arch: aarch64
            deb_arch: arm64
            python_arch: arm64
          - distro: ubuntu
            arch: armhf
            qemu_arch: arm
            deb_arch: armhf
            python_arch: arm32
          - distro: ubuntu
            arch: i386
            qemu_arch: i386
            deb_arch: i386
            python_arch: x86
          # Debian 架构
          - distro: debian
            arch: amd64
            qemu_arch: x86_64
            deb_arch: amd64
            python_arch: x64
          - distro: debian
            arch: arm64
            qemu_arch: aarch64
            deb_arch: arm64
            python_arch: arm64
          - distro: debian
            arch: armhf
            qemu_arch: arm
            deb_arch: armhf
            python_arch: arm32
          - distro: debian
            arch: i386
            qemu_arch: i386
            deb_arch: i386
            python_arch: x86
    steps:
      - uses: actions/checkout@v4
      
      # 1. 安装 QEMU 用户静态模拟器
      - name: Install QEMU static
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          sudo update-binfmts --enable
      
      # 2. 为目标架构设置 Python（使用 setup-python 的原生跨架构支持）
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.python_arch }}
      
      # 3. 安装构建依赖（在宿主上运行，但会通过 QEMU 模拟执行目标架构的二进制）
      - name: Install system dependencies for target arch
        run: |
          # 添加目标架构的软件源
          sudo dpkg --add-architecture ${{ matrix.deb_arch }}
          sudo apt-get update
          # 安装目标架构的 Python 开发包和 Tkinter
          sudo apt-get install -y \
            crossbuild-essential-${{ matrix.arch }} \
            python3-dev:${{ matrix.deb_arch }} \
            python3-tk:${{ matrix.deb_arch }} \
            binutils-${{ matrix.arch }}-linux-gnu
      
      # 4. 使用目标架构的 pip 安装 Python 包（通过 QEMU 模拟）
      - name: Install Python packages for target arch
        run: |
          # 创建并激活一个目标架构的虚拟环境
          python -m venv venv --system-site-packages
          source venv/bin/activate
          # 安装 PyInstaller 和其他依赖（这些包会被下载为目标架构的版本）
          pip install pyinstaller numpy pillow
      
      - name: Build CLI
        if: contains(matrix.arch, 'i386') == false
        run: |
          source venv/bin/activate
          pyinstaller --onefile --icon="build/windows/app.ico" --name="apt-cli-${{ matrix.distro }}-${{ matrix.arch }}" "build/linux/apt2.0.1.py"
      
      - name: Build GUI
        if: contains(matrix.arch, 'i386') == false
        run: |
          source venv/bin/activate
          pyinstaller --onefile --windowed --icon="build/windows/app.ico" --name="apt-gui-${{ matrix.distro }}-${{ matrix.arch }}" "build/linux/apt2.0.1-ui.py"
      
      - name: Build CLI (32-bit special handling)
        if: contains(matrix.arch, 'i386')
        run: |
          source venv/bin/activate
          # 32 位可能需要额外的编译器标志
          export CFLAGS="-m32"
          export LDFLAGS="-m32"
          pyinstaller --onefile --icon="build/windows/app.ico" --name="apt-cli-${{ matrix.distro }}-${{ matrix.arch }}" "build/linux/apt2.0.1.py"
      
      - name: Build GUI (32-bit special handling)
        if: contains(matrix.arch, 'i386')
        run: |
          source venv/bin/activate
          export CFLAGS="-m32"
          export LDFLAGS="-m32"
          pyinstaller --onefile --windowed --icon="build/windows/app.ico" --name="apt-gui-${{ matrix.distro }}-${{ matrix.arch }}" "build/linux/apt2.0.1-ui.py"
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apt-${{ matrix.distro }}-${{ matrix.arch }}
          path: dist/*
          
  # ==================== macOS 平台 ====================
  macos-amd64:
    name: macOS - AMD64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          brew install python-tk
          pip install pyinstaller numpy pillow
      - name: Build CLI
        run: pyinstaller --onefile --icon="build/windows/app.ico" --name="apt-cli-macos-amd64" "build/linux/apt2.0.1.py"
      - name: Build GUI
        run: pyinstaller --onefile --windowed --icon="build/windows/app.ico" --name="apt-gui-macos-amd64" "build/linux/apt2.0.1-ui.py"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: apt-macos-amd64
          path: dist/*

  macos-arm64:
    name: macOS - ARM64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python ARM64
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'arm64'
      - name: Install dependencies
        run: |
          brew install python-tk
          pip install pyinstaller numpy pillow
      - name: Build CLI
        run: pyinstaller --onefile --icon="build/windows/app.ico" --name="apt-cli-macos-arm64" "build/linux/apt2.0.1.py"
      - name: Build GUI
        run: pyinstaller --onefile --windowed --icon="build/windows/app.ico" --name="apt-gui-macos-arm64" "build/linux/apt2.0.1-ui.py"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: apt-macos-arm64
          path: dist/*

  # ==================== 创建 Release ====================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [windows-amd64, windows-x86, linux-cross, macos-amd64, macos-arm64]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## APT Encode v${{ github.ref_name }}
            
            ### 支持的平台和架构
            
            #### Windows
            - AMD64 (64-bit): `apt-win-amd64-cli.exe` / `apt-win-amd64-gui.exe`
            - x86 (32-bit): `apt-win-x86-cli.exe` / `apt-win-x86-gui.exe`
            
            #### Linux (通过 QEMU 交叉编译)
            - **Ubuntu / Debian - AMD64**: CLI / GUI
            - **Ubuntu / Debian - ARM64**: CLI / GUI  
            - **Ubuntu / Debian - ARM32 (armhf)**: CLI / GUI
            - **Ubuntu / Debian - x86 (32-bit)**: CLI / GUI
            
            #### macOS
            - Intel (AMD64): CLI / GUI
            - Apple Silicon (ARM64): CLI / GUI
            
            ## 使用方法
            下载对应平台的压缩包，解压后直接运行可执行文件。
          files: artifacts/**/*
          draft: false
          prerelease: falseeak-system-packages
      - name: Build CLI
        if: matrix.type == 'cli'
        run: pyinstaller --onefile --icon="build/windows/app.ico" --name="apt-cli-debian-x86" "build/linux/apt2.0.1.py"
      - name: Build GUI
        if: matrix.type == 'gui'
        run: pyinstaller --onefile --windowed --icon="build/windows/app.ico" --name="apt-gui-debian-x86" "build/linux/apt2.0.1-ui.py"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: apt-debian-x86-${{ matrix.type }}
          path: dist/*

  # ==================== macOS 平台 ====================
  
  macos-amd64:
    name: macOS - AMD64 (Intel)
    runs-on: macos-latest
    strategy:
      matrix:
        type: [cli, gui]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          brew install python-tk
          pip install pyinstaller numpy pillow
      - name: Build CLI
        if: matrix.type == 'cli'
        run: pyinstaller --onefile --icon="build/windows/app.ico" --name="apt-cli-macos-amd64" "build/linux/apt2.0.1.py"
      - name: Build GUI
        if: matrix.type == 'gui'
        run: pyinstaller --onefile --windowed --icon="build/windows/app.ico" --name="apt-gui-macos-amd64" "build/linux/apt2.0.1-ui.py"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: apt-macos-amd64-${{ matrix.type }}
          path: dist/*

  macos-arm64:
    name: macOS - ARM64 (Apple Silicon)
    runs-on: macos-latest
    strategy:
      matrix:
        type: [cli, gui]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python ARM64
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'arm64'
      - name: Install dependencies
        run: |
          brew install python-tk
          pip install pyinstaller numpy pillow
      - name: Build CLI
        if: matrix.type == 'cli'
        run: pyinstaller --onefile --icon="build/windows/app.ico" --name="apt-cli-macos-arm64" "build/linux/apt2.0.1.py"
      - name: Build GUI
        if: matrix.type == 'gui'
        run: pyinstaller --onefile --windowed --icon="build/windows/app.ico" --name="apt-gui-macos-arm64" "build/linux/apt2.0.1-ui.py"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: apt-macos-arm64-${{ matrix.type }}
          path: dist/*

  # ==================== 创建 Release ====================
  
  create-release:
    name: Create Release and Upload All Artifacts
    runs-on: ubuntu-latest
    needs: [windows-amd64, windows-x86, linux-ubuntu-amd64, linux-ubuntu-arm64, linux-ubuntu-arm32, linux-ubuntu-x86, linux-debian-amd64, linux-debian-arm64, linux-debian-arm32, linux-debian-x86, macos-amd64, macos-arm64]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## APT Encode v${{ github.ref_name }}
            
            ### Windows 版本
            - AMD64 (64位): apt-win-amd64-cli.exe / apt-win-amd64-gui.exe
            - x86 (32位): apt-win-x86-cli.exe / apt-win-x86-gui.exe
            
            ### Ubuntu 版本
            - AMD64: apt-cli-ubuntu-amd64 / apt-gui-ubuntu-amd64
            - ARM64: apt-cli-ubuntu-arm64 / apt-gui-ubuntu-arm64
            - ARM32: apt-cli-ubuntu-arm32 / apt-gui-ubuntu-arm32
            - x86 (32位): apt-cli-ubuntu-x86 / apt-gui-ubuntu-x86
            
            ### Debian 版本
            - AMD64: apt-cli-debian-amd64 / apt-gui-debian-amd64
            - ARM64: apt-cli-debian-arm64 / apt-gui-debian-arm64
            - ARM32: apt-cli-debian-arm32 / apt-gui-debian-arm32
            - x86 (32位): apt-cli-debian-x86 / apt-gui-debian-x86
            
            ### macOS 版本
            - Intel (AMD64): apt-cli-macos-amd64 / apt-gui-macos-amd64
            - Apple Silicon (ARM64): apt-cli-macos-arm64 / apt-gui-macos-arm64
            
            ## 使用方法
            下载对应平台的压缩包，解压后直接运行可执行文件。
          files: artifacts/**/*
          draft: false
          prerelease: false
