name: Build All Platforms

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  win-amd64-cli:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'
      - run: pip install pyinstaller numpy pillow
      - run: pyinstaller --onefile --icon="build/windows/app.ico" --name="apt-cli-win-amd64" "build/windows/apt2.0.1.py"
      - uses: actions/upload-artifact@v4
        with:
          name: apt-cli-win-amd64
          path: dist/*.exe

  win-amd64-gui:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'
      - run: pip install pyinstaller numpy pillow
      - run: pyinstaller --onefile --noconsole --icon="build/windows/app.ico" --name="apt-gui-win-amd64" "build/windows/apt2.0.1-ui.py"
      - uses: actions/upload-artifact@v4
        with:
          name: apt-gui-win-amd64
          path: dist/*.exe

  win-x86-cli:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x86'
      - run: pip install pyinstaller numpy pillow
      - run: pyinstaller --onefile --icon="build/windows/app.ico" --name="apt-cli-win-x86" "build/windows/apt2.0.1.py"
      - uses: actions/upload-artifact@v4
        with:
          name: apt-cli-win-x86
          path: dist/*.exe

  win-x86-gui:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x86'
      - run: pip install pyinstaller numpy pillow
      - run: pyinstaller --onefile --noconsole --icon="build/windows/app.ico" --name="apt-gui-win-x86" "build/windows/apt2.0.1-ui.py"
      - uses: actions/upload-artifact@v4
        with:
          name: apt-gui-win-x86
          path: dist/*.exe

  ubuntu-amd64-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
          pip install pyinstaller numpy pillow
      - run: pyinstaller --onefile --icon="build/windows/app.ico" --name="apt-cli-ubuntu-amd64" "build/linux/apt2.0.1.py"
      - uses: actions/upload-artifact@v4
        with:
          name: apt-cli-ubuntu-amd64
          path: dist/*

  ubuntu-amd64-gui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
          pip install pyinstaller numpy pillow
      - run: pyinstaller --onefile --windowed --icon="build/windows/app.ico" --name="apt-gui-ubuntu-amd64" "build/linux/apt2.0.1-ui.py"
      - uses: actions/upload-artifact@v4
        with:
          name: apt-gui-ubuntu-amd64
          path: dist/*

  ubuntu-arm64-cli:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
          pip install pyinstaller numpy pillow
      - run: pyinstaller --onefile --icon="build/windows/app.ico" --name="apt-cli-ubuntu-arm64" "build/linux/apt2.0.1.py"
      - uses: actions/upload-artifact@v4
        with:
          name: apt-cli-ubuntu-arm64
          path: dist/*

  ubuntu-arm64-gui:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
          pip install pyinstaller numpy pillow
      - run: pyinstaller --onefile --windowed --icon="build/windows/app.ico" --name="apt-gui-ubuntu-arm64" "build/linux/apt2.0.1-ui.py"
      - uses: actions/upload-artifact@v4
        with:
          name: apt-gui-ubuntu-arm64
          path: dist/*

  debian-amd64-cli:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
    steps:
      - uses: actions/checkout@v4
      - run: |
          apt-get update
          apt-get install -y python3 python3-pip python3-tk binutils
          pip install pyinstaller numpy pillow --break-system-packages
      - run: pyinstaller --onefile --icon="build/windows/app.ico" --name="apt-cli-debian-amd64" "build/linux/apt2.0.1.py"
      - uses: actions/upload-artifact@v4
        with:
          name: apt-cli-debian-amd64
          path: dist/*

  debian-amd64-gui:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
    steps:
      - uses: actions/checkout@v4
      - run: |
          apt-get update
          apt-get install -y python3 python3-pip python3-tk binutils
          pip install pyinstaller numpy pillow --break-system-packages
      - run: pyinstaller --onefile --windowed --icon="build/windows/app.ico" --name="apt-gui-debian-amd64" "build/linux/apt2.0.1-ui.py"
      - uses: actions/upload-artifact@v4
        with:
          name: apt-gui-debian-amd64
          path: dist/*

  debian-arm64-cli:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:bookworm
    steps:
      - uses: actions/checkout@v4
      - run: |
          apt-get update
          apt-get install -y python3 python3-pip python3-tk binutils
          pip install pyinstaller numpy pillow --break-system-packages
      - run: pyinstaller --onefile --icon="build/windows/app.ico" --name="apt-cli-debian-arm64" "build/linux/apt2.0.1.py"
      - uses: actions/upload-artifact@v4
        with:
          name: apt-cli-debian-arm64
          path: dist/*

  debian-arm64-gui:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:bookworm
    steps:
      - uses: actions/checkout@v4
      - run: |
          apt-get update
          apt-get install -y python3 python3-pip python3-tk binutils
          pip install pyinstaller numpy pillow --break-system-packages
      - run: pyinstaller --onefile --windowed --icon="build/windows/app.ico" --name="apt-gui-debian-arm64" "build/linux/apt2.0.1-ui.py"
      - uses: actions/upload-artifact@v4
        with:
          name: apt-gui-debian-arm64
          path: dist/*

  macos-amd64-cli:
    runs-on: macos-12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          brew install python-tk
          pip install pyinstaller numpy pillow
      - run: pyinstaller --onefile --icon="build/windows/app.ico" --name="apt-cli-macos-amd64" "build/linux/apt2.0.1.py"
      - uses: actions/upload-artifact@v4
        with:
          name: apt-cli-macos-amd64
          path: dist/*

  macos-amd64-gui:
    runs-on: macos-12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          brew install python-tk
          pip install pyinstaller numpy pillow
      - run: pyinstaller --onefile --windowed --icon="build/windows/app.ico" --name="apt-gui-macos-amd64" "build/linux/apt2.0.1-ui.py"
      - uses: actions/upload-artifact@v4
        with:
          name: apt-gui-macos-amd64
          path: dist/*

  macos-arm64-cli:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          brew install python-tk
          pip install pyinstaller numpy pillow
      - run: pyinstaller --onefile --icon="build/windows/app.ico" --name="apt-cli-macos-arm64" "build/linux/apt2.0.1.py"
      - uses: actions/upload-artifact@v4
        with:
          name: apt-cli-macos-arm64
          path: dist/*

  macos-arm64-gui:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          brew install python-tk
          pip install pyinstaller numpy pillow
      - run: pyinstaller --onefile --windowed --icon="build/windows/app.ico" --name="apt-gui-macos-arm64" "build/linux/apt2.0.1-ui.py"
      - uses: actions/upload-artifact@v4
        with:
          name: apt-gui-macos-arm64
          path: dist/*

  create-release:
    runs-on: ubuntu-latest
    needs:
      - win-amd64-cli
      - win-amd64-gui
      - win-x86-cli
      - win-x86-gui
      - ubuntu-amd64-cli
      - ubuntu-amd64-gui
      - ubuntu-arm64-cli
      - ubuntu-arm64-gui
      - debian-amd64-cli
      - debian-amd64-gui
      - debian-arm64-cli
      - debian-arm64-gui
      - macos-amd64-cli
      - macos-amd64-gui
      - macos-arm64-cli
      - macos-arm64-gui
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: "Build results for all platforms."
          files: artifacts/**/*
          draft: false
          prerelease: false
