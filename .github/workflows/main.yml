name: Build Both CLI and GUI

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-cli:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyinstaller numpy pillow
      - name: Build CLI
        run: |
          pyinstaller --onefile --icon="build/windows/app.ico" --name="apt-cli" "build/windows/apt2.0.1.py"
      - name: Upload CLI
        uses: actions/upload-artifact@v4
        with:
          name: apt-cli-windows
          path: dist/*.exe

  build-gui:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyinstaller numpy pillow
      - name: Build GUI
        run: |
          pyinstaller --onefile --noconsole --icon="build/windows/app.ico" --name="apt-gui" "build/windows/apt2.0.1-ui.py"
      - name: Upload GUI
        uses: actions/upload-artifact@v4
        with:
          name: apt-gui-windows
          path: dist/*.exe
